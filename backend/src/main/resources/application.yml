# CONFIGURACION DE LA APLICACION PRIMARIA BACKEND
spring:
  config:
    import: optional:application-secret.yml
  profiles:
    active: dev
  application:
    name: PrimarIA_sanitycode
  datasource:
    url: jdbc:mariadb://localhost:53306/primaria_db
    username: ${spring.datasource.username}
    password: ${spring.datasource.password}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.MariaDBDialect
  security:
    oauth2:
      client:
        registration:
          google:
            redirect-uri: "{baseUrl}/login/oauth2/code/google"
            client-id: ${GOOGLE_CLIENTE_ID}
            client-secret: ${GOOGLE_CLIENTE_SECRETO}
            scope:
              - email
              - profile
              - openid
        provider:
          google:
            authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
            token-uri: https://oauth2.googleapis.com/token
            user-info-uri: https://openidconnect.googleapis.com/v1/userinfo
            user-name-attribute: sub

app:
  frontend-url: http://127.0.0.1:5500/frontend

server:
  servlet:
    session:
      timeout: 10m
      cookie:
        same-site: None
        secure: true
        http-only: true

