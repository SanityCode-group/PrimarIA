<!doctype html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PrimarIA - Inicio de Sesión</title>
    <link rel="icon" type="image/png" href="./assets/img/favicon.png">
    <link rel="stylesheet" href="css/login.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <script type="module" src="./js/pages/login.js"></script>
</head>

<body>
    <div class="login-page">
        <!-- Lado Izquierdo: Branding -->
        <div class="brand-side">
            <div class="brand-content">
                <img src="./assets/img/logo-primaria-blanco.png" alt="Logo de PrimarIA" class="logo" />
                <h1>PrimarIA</h1>
                <p>Validación inteligente de casos clínicos para profesionales de la salud.</p>
            </div>
        </div>

        <!-- Lado Derecho: Formulario -->
        <div class="form-side">
            <div class="form-container">
                <div class="form-header">
                    <h2>Bienvenido</h2>
                    <p>Accede a tu panel para gestionar validaciones</p>
                </div>

                <form id="formRegistro">
                    <a href="#" class="google-link">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg"
                            alt="Google Logo" width="20">
                        Acceso con Google
                    </a>
                </form>

                <div class="form-footer">
                    <p>Proyecto Intermodular 2025-26 - SanityCode</p>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
