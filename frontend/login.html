<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro de Pacientes</title>

    <script src="./js/config.js"></script> <!-- Cargar configuración (URL backend, etc.) -->
    <!-- Cambiar el modo en sessionStorage antes de redirigir a google -->
     <script>
      document.addEventListener("DOMContentLoaded", () => {
        const backendBase = ENV.API_BASE;
        const googleLink = document.querySelector(".google-link");
        googleLink.href = `${backendBase}/oauth2/authorization/google`;
      });
    </script>

    <script>
      // La URL del botón de Google también es dinámica
      document.addEventListener("DOMContentLoaded", () => {
        const backendBase = ENV.API_BASE.replace("/api", "");
        document.querySelector(".google-link").href = 
          `${backendBase}/oauth2/authorization/google`;
      });
    </script>

    <link rel="stylesheet" href="css/login.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

  </head>
